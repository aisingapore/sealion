name: Sync FAQ from Confluence

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes for testing
  workflow_dispatch:         # Manual trigger — use this to test without waiting
  push:
    branches:
      - PLAY-1089-confluence-faq-sync

jobs:
  sync-faq:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch FAQ from Confluence and convert to Markdown
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          pip install html2text --quiet

          curl -s \
            -u "${CONFLUENCE_USERNAME}:${CONFLUENCE_API_TOKEN}" \
            "${CONFLUENCE_BASE_URL}/wiki/rest/api/content/1398276098?expand=body.export_view&status=draft" \
            -o confluence_response.json

          # Extract HTML and convert to Markdown
          python3 << 'EOF'
          import json, html2text

          with open("confluence_response.json") as f:
              data = json.load(f)

          html = data["body"]["export_view"]["value"]

          h = html2text.HTML2Text()
          h.ignore_links = False
          markdown = h.handle(html)

          with open("overview/faq.md", "w") as f:
              f.write(markdown)

          print("Done — faq.md written")
          EOF

          rm confluence_response.json

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: sync FAQ from Confluence"
          title: "docs: sync FAQ from Confluence"
          body: "Automated sync of FAQ content from Confluence page 1398276098."
          branch: confluence-faq-sync
          base: PLAY-1089-confluence-faq-sync
